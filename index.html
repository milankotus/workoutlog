<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Workout Log</title>

<!--
  ============================================================================
  WORKOUT LOG — Single-file calisthenics tracker
  ============================================================================

  IMPORTANT: All code changes MUST be commented. Every function, significant block,
  and non-obvious logic should have clear comments explaining WHAT it does and WHY.
  This rule applies to all future modifications.

  OVERVIEW:
    Local HTML file opened directly in browser (file:// protocol).
    Tracks daily exercises (sets/reps) plus body measurements (weight, waist).
    Based on Hybrid Calisthenics (https://www.hybridcalisthenics.com/programs).

  STORAGE:
    All data persisted in browser localStorage under key 'workout_log'.
    Saves instantly on every keystroke (no save button needed).
    Data survives browser restarts but NOT cache clearing or file moves.
    Use Export/Import JSON for backups.

  DATA STRUCTURE (state object stored in localStorage):
    {
      exercises: [                        // Master exercise list (shown in dropdowns)
        { name: "Horiz. Pullups",         // Display name
          rings: true,                    // Whether performed on gymnastic rings (⊙ badge)
          sets: 3,                        // Number of sets to show (1-6, configurable in Manage panel)
          masteryReps: 0,                 // Reps-per-set goal to consider exercise "mastered" (0 = no goal)
          archived: false                 // Hidden from dropdowns but preserved in history
        }, ...
      ],
      plan: {                             // Custom weekly plan (overrides PLAN constant)
        1: ["Pullups", "Dips"],           // Day-of-week (0=Sun..6=Sat) → exercise names
      },
      days: {                             // Training log, keyed by ISO date string
        "2025-03-23": {
          exercises: [                    // Exercises logged that day (up to 8)
            { name: "Horiz. Pullups",     // Must match a name from the exercises[] array
              sets: ["26", "23", "20"],   // Array of string values, one per set
              skipped: true               // Optional: marks exercise as skipped (not done that day)
            }, ...
          ],
          weight: "85",                   // Body weight in kg
          waist: "88"                     // Waist circumference in cm (body tracking)
        }, ...
      }
    }

  DEFAULT WEEKLY PLAN (PLAN object, overridden by state.plan):
    Defines which exercises auto-populate when opening a day for the first time.
    Changing an exercise propagates to all future weeks (same day-of-week, same slot).
    Mon: Horiz. Pullups, Dips / Hold, Straight Bridges
    Tue: Biceps curls, Advanced Incline Pushups, Knee Raises
    Wed: Horiz. Pullups, Straight Bridges, Squats
    Thu: Dips / Hold, Advanced Incline Pushups, Knee Raises
    Fri: Pullups, Biceps curls, Straight Bridges
    Sat: Knee Raises, Advanced Incline Pushups, Squats
    Sun: (empty — user can add exercises manually if desired)
    The plan only seeds EMPTY days. Once a day has data, the plan is ignored.

  UI LAYOUT:
    Each day = one horizontal row:
      [Day Label] [Tracking Cell] [Exercise Cell 1] [Exercise Cell 2] ... [+/−]

    Tracking cell contains (per day):
      - Weight input (kg) with 7-day average + week-over-week delta
      - Waist input (cm) with 7-day average + week-over-week delta

    Each exercise cell contains:
      - Dropdown (select from master exercise list)
      - History lines: -2 (2nd previous session), -1 (previous session), now (current, green)
        Each line shows individual set values + total reps when all sets filled
        (e.g. "26 · 23 · 20 = 69"). The "now" line updates live on each keystroke.
      - Set input fields (number depends on exercise's configured set count)
      - Move buttons: ◀/▶ on desktop, ▲/▼ on mobile (CSS media query swap)

    Today's row is highlighted with a purple border + glow.
    Week navigation via ← Previous / Next → / Today buttons.

  MODALS:
    Manage modal    — Footer button. Add/remove/rename/archive exercises, configure sets, toggle rings.
                       Click exercise name to rename inline — propagates to all history,
                       current week, and weekly plan template.

  KEY FUNCTIONS:
    render()               — Rebuilds the entire week grid.
    cell(d,dd,ei)          — Creates one exercise cell for a given day/exercise index.
    save()                 — Writes state to localStorage + triggers cloud sync.
    ensureDay(d)           — Gets or creates day data, seeding from PLAN/state.plan if empty.
    propagateDayPlan()     — Pushes exercise change to future weeks + updates plan.
    renameExercise()       — Renames exercise everywhere (master list, all days, plan).
    fmtSets()              — Formats sets array with total reps sum when all filled.
    getMasteryStreak()     — Counts consecutive goal-meeting sessions for mastery badge.
    migrate()              — Data migration (exercise renames, strip retired nutrition/activity fields).
    cloudSave() / cloudLoad() — Debounced cloud sync via Cloudflare Worker.

  EXPORT/IMPORT:
    - Export backup: Downloads complete state as JSON
    - Import backup: Loads JSON file, replaces all data
    - Export CSV: Semicolon-separated; exercises, weight, waist

  ============================================================================
-->

<style>
  /* Google Fonts: DM Sans (body) + JetBrains Mono (numbers, dates) */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  /* === COLOR PALETTE === */
  :root {
    --bg: #0f1117;       /* Page background */
    --bg2: #181a24;      /* Card/cell background */
    --bg3: #21242f;      /* Input/button background */
    --bg4: #2a2e3b;      /* Hover states */
    --border: #2f3340;   /* Borders */
    --text: #e4e6ed;     /* Primary text */
    --text2: #9ba0b0;    /* Secondary text */
    --text3: #636879;    /* Muted/placeholder text */
    --accent: #6c5ce7;   /* Primary accent (purple) — today highlight, focused inputs */
    --accent2: #a29bfe;  /* Light accent */
    --green: #00b894;    /* Current week data, success states */
    --green2: #55efc4;   /* Light green */
    --red: #e17055;      /* Delete/remove actions */
    --orange: #f5a623;   /* Rings badge (⊙) */
    --pink: #e84393;     /* Unused, kept for potential future use */
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg);
    color: var(--text); min-height: 100vh; padding: 16px;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  /* === HEADER === */
  .header { text-align: center; padding: 14px 0 4px; }
  .header h1 {
    font-size: 24px; font-weight: 700; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent2), var(--green2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .header .sub { color: var(--text3); font-size: 11px; margin-top: 2px; }
  .header a { color: var(--accent2); text-decoration: none; font-size: 11px; }
  .header a:hover { text-decoration: underline; }

  /* === WEEK NAVIGATION BAR === */
  .week-nav {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; margin: 14px 0;
  }
  .week-nav button {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    padding: 6px 14px; border-radius: var(--radius-sm); cursor: pointer;
    font-family: inherit; font-size: 13px; transition: all .15s;
  }
  .week-nav button:hover { background: var(--bg4); border-color: var(--accent); }
  .week-nav .today-btn { background: var(--accent); border-color: var(--accent); font-weight: 600; color: white; }
  .week-nav .today-btn:hover { background: var(--accent2); }
  .week-nav .week-label {
    font-family: 'JetBrains Mono', monospace; font-size: 15px;
    font-weight: 600; color: var(--text); min-width: 260px; text-align: center;
  }

  /* === DAY ROW — one per day, contains label + exercise cells === */
  .day-row {
    display: flex; gap: 8px; margin-bottom: 8px; align-items: stretch; position: relative;
  }
  /* Purple glow border around today's row */
  .day-row.is-today::before {
    content: ''; position: absolute;
    left: -4px; top: -3px; bottom: -3px; right: -4px;
    border: 2px solid var(--accent); border-radius: 14px;
    pointer-events: none; box-shadow: 0 0 20px rgba(108,92,231,.15);
  }

  /* === DAY LABEL — left column showing day name + date === */
  .day-label {
    width: 100px; min-width: 100px; border-radius: var(--radius);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 8px 6px; flex-shrink: 0;
  }
  .day-label-name { font-size: 12px; font-weight: 700; color: white; text-transform: uppercase; letter-spacing: .5px; }
  .day-label-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,.7); margin-top: 1px; }
  .day-label .today-tag {
    font-size: 8px; font-weight: 700; color: white;
    background: rgba(0,0,0,.3); padding: 1px 7px; border-radius: 8px;
    margin-top: 3px; letter-spacing: 1px;
  }

  /* === EXERCISE ROW — flex container for exercise cells, wraps if >3-4 exercises === */
  .exercises-row { display: flex; flex: 1; gap: 6px; min-width: 0; flex-wrap: wrap; }

  /* === EXERCISE CELL — one per exercise: dropdown + history + set inputs === */
  .exercise-cell {
    flex: 1 1 90px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 6px; display: flex;
    flex-direction: column; min-width: 80px; transition: border-color .15s;
  }
  .exercise-cell:hover { border-color: var(--bg4); }

  /* Exercise dropdown */
  .exercise-cell select {
    width: 100%; max-width: 100%; font-size: 11px; padding: 4px 6px;
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius-sm); font-family: inherit; cursor: pointer;
    outline: none; margin-bottom: 3px; box-sizing: border-box; overflow: hidden; text-overflow: ellipsis;
  }
  .exercise-cell select:focus { border-color: var(--accent); }

  /* === HISTORY LINES — show -2, -1, now data === */
  .wk-line {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    display: flex; align-items: center; gap: 3px; line-height: 1.4;
  }
  .wk-label { font-family: 'DM Sans', sans-serif; font-size: 9px; color: var(--text3); white-space: nowrap; width: 28px; flex-shrink: 0; }
  .wk-val { color: var(--text2); }              /* Past weeks — gray */
  .wk-val.cur { color: var(--green); font-weight: 500; }  /* Current week — green */
  .wk-none { color: var(--text3); }              /* No data — dash */
  .wk-diff-pos { color: var(--green); font-weight: 500; }
  .wk-diff-neg { color: var(--red); font-weight: 500; }
  .wk-diff-zero { color: var(--text3); }

  /* === SET INPUT ROW — horizontal row of text inputs, one per set === */
  .sets-row {
    display: flex; gap: 3px; margin-top: 4px;
  }
  .sets-row input {
    flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 13px;
    padding: 4px 2px; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; outline: none; text-align: center;
    transition: border-color .15s; min-width: 0;
  }
  .sets-row input:focus { border-color: var(--accent); }
  .sets-row input::placeholder { color: var(--text3); opacity: .3; font-size: 10px; }

  /* === ADD/REMOVE EXERCISE BUTTONS — circular +/− at end of each row === */
  .add-ex-cell {
    width: 28px; min-width: 28px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px; flex-shrink: 0;
  }
  .add-ex-btn, .rm-ex-btn {
    width: 24px; height: 24px; border-radius: 50%; border: 1px dashed var(--border);
    background: var(--bg2); color: var(--text3); cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all .15s; font-family: inherit;
  }
  .add-ex-btn:hover { border-color: var(--green); color: var(--green); }
  .rm-ex-btn:hover { border-color: var(--red); color: var(--red); }

  /* Move exercise buttons — ◀/▶ on desktop, ▲/▼ on mobile (swapped via @media) */
  .move-row { display: flex; justify-content: center; gap: 4px; margin-top: 4px; }
  .move-btn {
    width: 22px; height: 18px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--bg3); color: var(--text3); cursor: pointer;
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    transition: all .15s; font-family: inherit; padding: 0;
  }
  .move-btn:hover { border-color: var(--accent); color: var(--accent); }
  /* Arrows: left/right on desktop, up/down on mobile */
  .move-prev::after { content: '\25C0'; }
  .move-next::after { content: '\25B6'; }

  /* === FOOTER === */
  .footer {
    margin-top: 14px; padding: 10px 0;
    display: flex; align-items: center; justify-content: flex-end;
    flex-wrap: wrap; gap: 8px;
  }
  .footer-right { display: flex; gap: 6px; flex-wrap: wrap; }
  .footer-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text3);
    padding: 5px 12px; border-radius: var(--radius-sm); cursor: pointer;
    font-family: inherit; font-size: 11px; transition: all .15s;
  }
  .footer-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .footer-btn.danger:hover { border-color: var(--red); color: var(--red); }

  .storage-info {
    text-align: center; font-size: 10px; color: var(--text3); margin-top: 6px;
  }
  .storage-info span { color: var(--green); }

  /* === MANAGE EXERCISES MODAL === */
  .manage-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 100; align-items: center; justify-content: center;
  }
  .manage-overlay.open { display: flex; }
  .manage-box {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; width: 720px; max-width: 95vw; max-height: 80vh; overflow-y: auto;
  }
  .manage-box h3 { font-size: 15px; font-weight: 600; color: var(--accent2); margin-bottom: 12px; }
  .manage-item {
    display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    padding: 5px 8px; background: var(--bg3); border-radius: var(--radius-sm); font-size: 13px;
  }
  .manage-item .ex-name { flex: 1; cursor: pointer; }
  .manage-item .ex-name:hover { color: var(--accent2); }
  .manage-item .ex-name-edit {
    flex: 1; font-family: inherit; font-size: 13px; padding: 2px 6px;
    background: var(--bg2); border: 1px solid var(--accent); color: var(--text);
    border-radius: 4px; outline: none;
  }
  .manage-item .ring-badge {
    font-size: 10px; color: var(--orange); background: rgba(245,166,35,.12);
    padding: 1px 6px; border-radius: 8px; font-weight: 600;
  }
  /* Sets count −/+ controls in manage panel */
  .manage-item .sets-cfg {
    display: flex; align-items: center; gap: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2);
  }
  .manage-item .sets-cfg button {
    width: 20px; height: 20px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text2); cursor: pointer;
    font-size: 12px; display: flex; align-items: center; justify-content: center;
    transition: all .15s; font-family: inherit;
  }
  .manage-item .sets-cfg button:hover { border-color: var(--accent); color: var(--accent2); }
  .manage-item .sets-cfg .sets-num { width: 18px; text-align: center; font-weight: 600; }
  .manage-item .mastery-cfg {
    display: flex; align-items: center; gap: 3px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2);
  }
  .manage-item .mastery-cfg input {
    width: 36px; text-align: center; font-family: inherit; font-size: 11px; font-weight: 600;
    background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; padding: 2px; outline: none;
  }
  .manage-item .mastery-cfg input:focus { border-color: var(--accent); }
  .manage-item .mastery-cfg input::placeholder { color: var(--text3); }
  .manage-item .del-btn {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 14px; padding: 0 4px; transition: all .15s;
  }
  .manage-item .del-btn:hover { color: var(--red); }
  .mastery-badge {
    font-size: 10px; font-weight: 700; letter-spacing: .5px;
    margin-top: 3px; padding: 2px 6px; border-radius: 4px; text-align: center;
  }
  .mastery-0 { color: var(--text3); font-size: 9px; }
  .mastery-1 { color: var(--orange); font-size: 9px; }
  .mastery-2 { color: #f5a623; font-size: 10px; font-weight: 700; background: rgba(245,166,35,.1); }
  .mastery-3 {
    color: #00ff88; font-size: 11px; font-weight: 700;
    background: rgba(0,255,136,.12); border: 1px solid rgba(0,255,136,.25);
    text-shadow: 0 0 8px rgba(0,255,136,.5);
    animation: masteryPulse 2s ease-in-out infinite;
  }
  @keyframes masteryPulse {
    0%, 100% { box-shadow: 0 0 4px rgba(0,255,136,.15); }
    50% { box-shadow: 0 0 12px rgba(0,255,136,.35); }
  }
  /* === SKIP EXERCISE — button + dimmed cell state === */
  .skip-btn {
    background: none; border: 1px solid var(--border); color: var(--text3);
    font-size: 9px; padding: 1px 6px; border-radius: 4px; cursor: pointer;
    font-family: inherit; margin-top: 2px; transition: all .15s; align-self: flex-start;
  }
  .skip-btn:hover { color: var(--orange); border-color: var(--orange); }
  .skip-btn.active { color: var(--orange); border-color: var(--orange); background: rgba(245,166,35,.08); }
  .exercise-cell.skipped { opacity: 0.5; }
  .skipped-label {
    font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 1px;
    text-align: center; padding: 8px 0; flex: 1; display: flex; align-items: center; justify-content: center;
  }

  .manage-add { display: flex; gap: 6px; margin-top: 10px; align-items: center; }
  .manage-add input[type="text"] {
    flex: 1; font-family: inherit; font-size: 13px; padding: 6px 10px;
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius-sm); outline: none;
  }
  .manage-add input[type="text"]:focus { border-color: var(--accent); }
  .manage-add label { font-size: 12px; color: var(--text2); cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 3px; }
  .manage-add input[type="checkbox"] { accent-color: var(--orange); cursor: pointer; }
  .manage-add .add-btn {
    background: var(--green); border: none; color: white; padding: 6px 14px;
    border-radius: var(--radius-sm); cursor: pointer; font-family: inherit; font-weight: 600; font-size: 13px;
  }
  .manage-add .add-btn:hover { background: var(--green2); color: var(--bg); }
  .manage-close {
    margin-top: 12px; width: 100%; padding: 8px; background: var(--bg3);
    border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm);
    cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500;
  }
  .manage-close:hover { border-color: var(--accent); color: var(--accent2); }
  .manage-hint { font-size: 11px; color: var(--text3); margin-bottom: 10px; }
  .manage-item .archive-btn {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 12px; padding: 0 4px; transition: all .15s;
  }
  .manage-item .archive-btn:hover { color: var(--orange); }
  .archived-toggle {
    font-size: 11px; color: var(--text3); cursor: pointer; margin-top: 10px;
    background: none; border: none; font-family: inherit; padding: 0;
  }
  .archived-toggle:hover { color: var(--accent2); }
  .archived-list .manage-item { opacity: 0.6; }
  .archived-list .manage-item .restore-btn {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 11px; padding: 2px 6px; transition: all .15s;
  }
  .archived-list .manage-item .restore-btn:hover { color: var(--green); }

  /* === CARDIO SUB-ELEMENTS — weight/waist input rows inside the tracking cell === */
  .cardio-row {
    display: flex; align-items: center; gap: 4px;
  }
  .cardio-icon { font-size: 11px; width: 16px; text-align: center; flex-shrink: 0; }
  .cardio-row input {
    width: 100%; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 3px 4px; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 4px; outline: none; text-align: center;
    transition: border-color .15s; min-width: 0;
  }
  .cardio-row input:focus { border-color: var(--accent); }
  .cardio-row input::placeholder { color: var(--text3); opacity: .4; font-size: 9px; }
  .cardio-label { font-size: 8px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; }
  .cardio-unit { font-size: 9px; color: var(--text3); flex-shrink: 0; }
  .cardio-avg { font-size: 9px; color: var(--accent); flex-shrink: 0; font-family: 'JetBrains Mono', monospace; margin-left: 2px; }
  /* Week-over-week delta: avg(last 7d) − avg(prior 7d). Neutral color — up/down not judged good/bad. */
  .cardio-delta { font-size: 9px; color: var(--text2); flex-shrink: 0; font-family: 'JetBrains Mono', monospace; margin-left: 2px; }

  /* === TRACKING CELL — holds weight + waist rows for a day === */
  .tracking-cell {
    width: 170px; min-width: 170px; background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 6px 8px; display: flex;
    flex-direction: column; justify-content: center; gap: 3px; flex-shrink: 0;
  }
  .tracking-cell:hover { border-color: var(--bg4); }

  /* Hidden file input for JSON import */
  #fileInput { display: none; }

  /* === DESKTOP — bump fonts across the app (mobile keeps the dense default sizing) === */
  @media (min-width: 601px) {
    .container { max-width: min(2200px, 98vw); }
    /* Keep all exercises for a day on one horizontal row instead of wrapping;
       horizontal scroll kicks in only if they don't all fit. */
    .exercises-row { flex-wrap: nowrap; overflow-x: auto; }
    .exercise-cell { flex: 1 1 140px; min-width: 140px; }

    /* Header */
    .header h1 { font-size: 22px; }
    .header .sub { font-size: 11px; }
    .header a { font-size: 11px; }

    /* Week nav */
    .week-nav button { font-size: 13px; padding: 7px 12px; }
    .week-nav .week-label { font-size: 15px; }

    /* Day label */
    .day-label-name { font-size: 12px; }
    .day-label-date { font-size: 10px; }

    /* Exercise cell — readable but not oversized */
    .exercise-cell { padding: 7px; }
    .exercise-cell select { font-size: 11px; padding: 4px 6px; margin-bottom: 3px; }
    .wk-line { font-size: 10px; line-height: 1.4; gap: 3px; }

<body>

      <button class="footer-btn" onclick="exportJSON()">Export backup</button>
      <button class="footer-btn" onclick="document.getElementById('fileInput').click()">Import backup</button>
      <button class="footer-btn" onclick="exportCSV()">Export CSV</button>
    </div>
  </div>

  <div class="storage-info">
    <span>●</span> All changes saved instantly · Cloud: <span id="syncStatus" style="font-weight:600">loading...</span>
  </div>

  <!-- Hidden file picker for import -->
  <input type="file" id="fileInput" accept=".json" onchange="importJSON(event)">
</div>

<!-- === MANAGE EXERCISES MODAL — opened via "Manage exercises" button === -->
<div class="manage-overlay" id="manageOverlay" onclick="if(event.target===this)closeManage()">
  <div class="manage-box">
    <h3>Manage exercises</h3>
    <div class="manage-hint">Use − / + to set number of sets per exercise. Goal = reps to master before progressing.</div>
    <div id="manageList"></div>
    <button class="archived-toggle" id="archivedToggle" style="display:none" onclick="toggleArchivedList()"></button>
    <div id="archivedList" class="archived-list" style="display:none"></div>
    <div class="manage-add">
      <input type="text" id="newExName" placeholder="New exercise..." onkeydown="if(event.key==='Enter')addExercise()">
      <label><input type="checkbox" id="newExRings"> ⊙</label>
      <input type="text" inputmode="numeric" id="newExMastery" placeholder="Goal" style="width:50px;font-family:inherit;font-size:12px;padding:5px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);outline:none;" oninput="this.value=normalizeNum(this.value)" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      <button class="add-btn" onclick="addExercise()">Add</button>
    </div>
    <button class="manage-close" onclick="closeManage()">Close</button>
  </div>
</div>

<script>
// ============================================================================
// CONSTANTS
// ============================================================================

/** localStorage key where all data is stored */
const LS = 'workout_log';

/** Cloud sync via Cloudflare Worker (keeps API key server-side) */
const WORKER_URL = 'https://workout-sync.milan-kotus.workers.dev';

/** Full day names for display in modals and CSV export */
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
/** Short day names for the week grid row labels */
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/** Neutral color for all day labels */
const DAY_COLOR = '#3a3f50';

/**
 * DEFAULT WEEKLY PLAN
 * Maps day-of-week (0=Sun, 1=Mon, ..., 6=Sat) to an array of exercise names.
 * These auto-populate when a day is opened for the first time.
 * Once a day has any data, this plan is NOT re-applied.
 * To change the default workout schedule, edit the arrays below.
 */
const PLAN = {
  1: ['Horiz. Pullups', 'Dips / Hold', 'Straight Bridges'],           // Monday
  2: ['Biceps curls', 'Advanced Incline Pushups', 'Knee Raises'],      // Tuesday
  3: ['Horiz. Pullups', 'Straight Bridges', 'Squats'],                 // Wednesday
  4: ['Dips / Hold', 'Advanced Incline Pushups', 'Knee Raises'],       // Thursday
  5: ['Pullups', 'Biceps curls', 'Straight Bridges'],                  // Friday
  6: ['Knee Raises', 'Advanced Incline Pushups', 'Squats'],            // Saturday
  0: []                                                                 // Sunday (empty — normal day, user adds manually)
};

// ============================================================================
// STATE INITIALIZATION
// ============================================================================

const today = new Date(); today.setHours(0,0,0,0);

/** weekStart = Monday of the currently displayed week */
let weekStart = getMonday(new Date(today));

/**
 * Returns the default state object used when no data exists in localStorage.
 * exercises[].sets = number of set input fields (1-6), NOT the set data.
 * The actual recorded set data lives in state.days[dateKey].exercises[].sets (array of strings).
 */
function defaultState() {
  return {
    exercises: [
      { name: 'Horiz. Pullups',          rings: true,  sets: 3 },
      { name: 'Pullups',                 rings: true,  sets: 3 },
      { name: 'Dips / Hold',             rings: true,  sets: 3 },
      { name: 'Biceps curls',            rings: true,  sets: 3 },
      { name: 'Advanced Incline Pushups', rings: false, sets: 3 },
      { name: 'Straight Bridges',        rings: false, sets: 3 },
      { name: 'Squats',                  rings: false, sets: 3 },
      { name: 'Knee Raises',             rings: false, sets: 3 },
    ],
    days: {}
  };
}

/**
 * Load state from localStorage, or use defaults.
 * If data exists, run migrate() to handle schema changes from older versions.
 * Falls back to defaults on parse errors (corrupted localStorage).
 */
let state;
try {
  const raw = localStorage.getItem(LS);
  if (raw) { state = JSON.parse(raw); migrate(); }
  else { state = defaultState(); }
} catch(e) { state = defaultState(); }

/**
 * MIGRATION — renames old exercise names from previous versions of this file
 * and strips retired nutrition/activity data that was removed from the schema.
 * Safe to run multiple times.
 */
function migrate() {
  const renames = {
    'kliky': 'Advanced Incline Pushups',
    'Kliky': 'Advanced Incline Pushups',
    'Hindu kliky': 'Advanced Incline Pushups',
    'Bridges': 'Straight Bridges',
    'Leg Raises': 'Knee Raises'
  };
  // Rename in exercise list + ensure sets config
  state.exercises = (state.exercises || []).map(e => {
    if (renames[e.name]) e.name = renames[e.name];
    if (!e.sets || e.sets < 1) e.sets = 3;
    return e;
  });
  // Deduplicate exercises by name
  const seen = new Set();
  state.exercises = state.exercises.filter(e => {
    if (seen.has(e.name)) return false;
    seen.add(e.name); return true;
  });
  // Rename in day log data
  Object.values(state.days || {}).forEach(d =>
    (d.exercises || []).forEach(ex => {
      if (renames[ex.name]) ex.name = renames[ex.name];
    })
  );
  // Strip retired nutrition/activity fields from every logged day.
  // These were dropped from the schema — we actively delete so saved state stays clean.
  Object.values(state.days || {}).forEach(d => {
    delete d.meals;
    delete d.activities;
    delete d.goals;
    // Very old pre-activities fields (previously migrated into activities[], now gone too)
    delete d.running; delete d.running_min;
    delete d.rucking_km; delete d.rucking_kg;
  });
  // Drop top-level retired fields from state
  delete state.goals;
  delete state.hiddenMeals;
  delete state.customActivities;
}

// ============================================================================
// STORAGE
// ============================================================================

/**
 * STORAGE SYSTEM
 *
 * save() writes to localStorage instantly on every change, then triggers a
 * debounced cloud save (3s delay) to avoid hammering the API during rapid typing.
 *
 * cloudLoad() runs once on page load to pull the latest state from the cloud.
 * If cloud data exists and has content, it overwrites localStorage (_skipCloud
 * flag prevents the overwrite from triggering another cloud save).
 *
 * Cloud sync goes through a Cloudflare Worker proxy that validates the PIN
 * and forwards to JSONBin.io for storage.
 */
let _cloudTimer = null;
/** When true, save() skips cloud sync (used during cloudLoad to prevent feedback loop) */
let _skipCloud = false;

/** Get or prompt for the sync PIN, stored in localStorage */
function getPin() {
  let pin = localStorage.getItem('workout_pin');
  if (!pin) {
    pin = prompt('Enter sync PIN:');
    if (pin) localStorage.setItem('workout_pin', pin);
  }
  return pin;
}

/** Persist state to localStorage + trigger debounced cloud save */
function save() {
  localStorage.setItem(LS, JSON.stringify(state));
  if (!_skipCloud) cloudSave();
}

/** Debounced cloud save — waits 3s after last call before sending PUT */
function cloudSave() {
  clearTimeout(_cloudTimer);
  const pin = getPin();
  if (!pin) return;
  setSyncStatus('pending');
  _cloudTimer = setTimeout(() => {
    setSyncStatus('syncing');
    fetch(WORKER_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + pin
      },
      body: JSON.stringify(state)
    })
    .then(r => {
      if (r.status === 401) { localStorage.removeItem('workout_pin'); setSyncStatus('wrong PIN'); return; }
      setSyncStatus(r.ok ? 'synced' : 'error');
    })
    .catch(() => setSyncStatus('error'));
  }, 3000);
}

/** Pull latest state from cloud on page load. Overwrites local data if cloud has content. */
function cloudLoad() {
  const pin = getPin();
  if (!pin) { setSyncStatus('no PIN'); return; }
  setSyncStatus('syncing');
  fetch(WORKER_URL, {
    headers: { 'Authorization': 'Bearer ' + pin }
  })
  .then(r => {
    if (r.status === 401) { localStorage.removeItem('workout_pin'); setSyncStatus('wrong PIN'); return null; }
    if (!r.ok) throw new Error();
    return r.json();
  })
  .then(record => {
    if (!record) return;
    // Only overwrite if cloud data has actual day entries (not empty/corrupt)
    if (record.days && Object.keys(record.days).length > 0) {
      state = record;
      migrate();
      _skipCloud = true;   // Prevent cloud save during local write
      localStorage.setItem(LS, JSON.stringify(state));
      _skipCloud = false;
      render();
    }
    setSyncStatus('synced');
  })
  .catch(() => setSyncStatus('error'));
}

/** Update the sync status indicator text and color in the footer */
function setSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  if (status === 'syncing')     { el.textContent = 'syncing...'; el.style.color = 'var(--orange)'; }
  else if (status === 'pending'){ el.textContent = 'saving...';  el.style.color = 'var(--text3)'; }
  else if (status === 'synced') { el.textContent = 'synced';     el.style.color = 'var(--green)'; }
  else if (status === 'wrong PIN') { el.textContent = 'wrong PIN (refresh)'; el.style.color = 'var(--red)'; }
  else if (status === 'no PIN') { el.textContent = 'no PIN';     el.style.color = 'var(--text3)'; }
  else                          { el.textContent = 'offline';    el.style.color = 'var(--red)'; }
}

// ============================================================================
// UTILITY FUNCTIONS
// ============================================================================

/** Returns configured number of sets for an exercise (from master exercise list) */
function getSetCount(name) {
  const ex = state.exercises.find(e => e.name === name);
  return ex && ex.sets ? ex.sets : 3;
}

/**
 * Pads or trims a sets data array to match the configured set count.
 * E.g., if exercise is configured for 3 sets but array has 2 entries, adds one empty string.
 */
function normalizeSets(data, name) {
  const n = getSetCount(name);
  if (!data || !Array.isArray(data)) data = [];
  while (data.length < n) data.push('');
  if (data.length > n) data = data.slice(0, n);
  return data;
}

/** Date → "YYYY-MM-DD" string key for state.days */
function dk(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

/** Average of `field` over a `window`-day span ending `offset` days before dateKey (inclusive).
 *  offset=0, window=7 → last 7 days ending at dateKey.
 *  offset=7, window=7 → the 7 days before that. Skips missing days; returns null if no entries. */
function avgRange(field, dateKey, offset, window) {
  const parts = dateKey.split('-');
  const base = new Date(+parts[0], +parts[1] - 1, +parts[2]);
  let sum = 0, n = 0;
  for (let i = 0; i < window; i++) {
    const d = new Date(base); d.setDate(base.getDate() - offset - i);
    const dd = state.days[dk(d)];
    if (dd && dd[field]) { const v = parseFloat(dd[field]); if (!isNaN(v)) { sum += v; n++; } }
  }
  return n ? (sum / n) : null;
}

/** Average of `field` over last 7 days ending at dateKey (inclusive). Skips missing days. */
function avg7(field, dateKey) { return avgRange(field, dateKey, 0, 7); }

/** Week-over-week delta for `field` at dateKey: avg(last 7 days) − avg(prior 7 days).
 *  Returns null if either window has zero logged entries. */
function weekDelta(field, dateKey) {
  const cur = avgRange(field, dateKey, 0, 7);
  const prev = avgRange(field, dateKey, 7, 7);
  return (cur === null || prev === null) ? null : (cur - prev);
}

/** Returns the Monday of the week containing date d */
function getMonday(d) {
  const dd = new Date(d);
  const day = dd.getDay();
  dd.setDate(dd.getDate() - day + (day === 0 ? -6 : 1));
  dd.setHours(0,0,0,0);
  return dd;
}

/** Check if two Date objects represent the same calendar day */
function same(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

/** Date → "DD.MM.YYYY" for display */
function fmt(d) {
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
}

/**
 * Get or create day data for a given date.
 * If the day has no exercises yet, seeds it from PLAN.
 */
function ensureDay(d) {
  const k = dk(d);
  if (!state.days[k]) state.days[k] = { exercises: [] };
  const dd = state.days[k];
  const dow = d.getDay();
  // Use custom plan only for today and future dates; past dates use hardcoded PLAN
  const useCustom = state.plan && state.plan[dow] && k >= dk(today);
  const p = useCustom ? state.plan[dow] : (PLAN[dow] || []);
  // Only seed from plan if day has no exercises AND user hasn't intentionally cleared them
  if (dd.exercises.length === 0 && p.length > 0 && !dd.noExercises) {
    dd.exercises = p.map(n => ({ name: n, sets: normalizeSets([], n) }));
    save();
  }
  return dd;
}

/**
 * After any exercise modification, read the resulting exercise list for the
 * modified day and propagate it to all future days with the same day-of-week.
 * Also updates state.plan so newly created future days get the right template.
 *
 * For each future day: exercises are resized to match, names are set to match.
 * If a slot already had the same exercise name, its recorded sets are preserved.
 * If the name changed, sets are reset.
 */
function propagateDayPlan(d) {
  const dow = d.getDay();
  const changedKey = dk(d);
  const src = state.days[changedKey];
  const names = (src && src.exercises) ? src.exercises.map(e => e.name) : [];

  // Update saved plan template
  if (!state.plan) state.plan = {};
  state.plan[dow] = [...names];

  // Update all future existing days with same day-of-week
  for (const [key, dd] of Object.entries(state.days)) {
    if (key <= changedKey) continue;
    const [y, m, day] = key.split('-').map(Number);
    if (new Date(y, m - 1, day).getDay() !== dow) continue;

    if (names.length === 0) {
      dd.exercises = [];
      dd.noExercises = true;
      continue;
    }
    delete dd.noExercises;
    dd.exercises = names.map((name, i) => {
      const old = dd.exercises && dd.exercises[i];
      // Preserve recorded sets if the exercise at this slot is unchanged
      if (old && old.name === name) return old;
      return { name: name, sets: normalizeSets([], name) };
    });
  }
}

/** Find the most recent N recorded sessions of exercise `name` before `dateKey`.
 *  Returns array of sets arrays, most recent first (index 0 = previous, 1 = one before that). */
function getRecentSets(dateKey, name, n) {
  var results = [];
  var allDates = Object.keys(state.days).filter(function(k) { return k < dateKey; }).sort().reverse();
  for (var di = 0; di < allDates.length && results.length < n; di++) {
    var day = state.days[allDates[di]];
    if (!day || !day.exercises) continue;
    for (var ei = 0; ei < day.exercises.length; ei++) {
      var ex = day.exercises[ei];
      if (ex.name !== name || ex.skipped || !ex.sets || !ex.sets.some(function(s) { return s; })) continue;
      results.push(ex.sets);
      break;
    }
  }
  return results;
}

/** Average of the per-session set sums for the last 5 days the exercise was scheduled
 *  before `dateKey`. Skipped days count toward the 5-day window but are excluded from
 *  the average (so a single skip narrows the sample to 4, two skips to 3, etc).
 *  Unfilled set values count as 0. Returns null if no usable history. */
function getRecent5Avg(dateKey, name) {
  var dates = Object.keys(state.days).filter(function(k) { return k < dateKey; }).sort().reverse();
  var sums = [];
  var scheduled = 0;
  for (var di = 0; di < dates.length && scheduled < 5; di++) {
    var day = state.days[dates[di]];
    if (!day || !day.exercises) continue;
    var ex = null;
    for (var ei = 0; ei < day.exercises.length; ei++) {
      if (day.exercises[ei].name === name) { ex = day.exercises[ei]; break; }
    }
    if (!ex) continue;
    scheduled++;
    if (ex.skipped) continue;
    var sum = (ex.sets || []).reduce(function(a, v) { return a + (parseInt(v) || 0); }, 0);
    sums.push(sum);
  }
  if (!sums.length) return null;
  return sums.reduce(function(a, v) { return a + v; }, 0) / sums.length;
}

/** Format a sets array as "26 · 23 · 20" for display. Returns null if no data.
 *  Appends " = {sum}" when multiple sets are all filled with numbers. */
function fmtSets(s) {
  if (!s) return null;
  if (!s.some(v => v)) return null;
  const formatted = s.map(v => v || '–').join(' · ');
  if (s.length > 1 && s.every(v => v && !isNaN(parseInt(v)))) {
    const total = s.reduce((a, v) => a + (parseInt(v) || 0), 0);
    return formatted + ' = ' + total;
  }
  return formatted;
}

/**
 * Count consecutive sessions (most recent first, up to `upToDate`) where
 * every set of the given exercise met the mastery goal.
 * A "session" is any day where the exercise has at least one set filled.
 * Days where the exercise wasn't logged or was skipped are ignored (not a session).
 * A session with data that doesn't meet the goal breaks the streak.
 */
function getMasteryStreak(exName, goal, numSets, upToDate) {
  const limit = dk(upToDate);
  const dates = Object.keys(state.days).filter(k => k <= limit).sort().reverse();
  let streak = 0;
  for (const k of dates) {
    const dd = state.days[k];
    if (!dd || !dd.exercises) continue;
    const ex = dd.exercises.find(e => e.name === exName);
    if (!ex) continue;
    // Skipped exercises are transparent — they never break the streak
    if (ex.skipped) continue;
    if (!ex.sets || !ex.sets.some(s => s)) continue;
    // Real session — check if all sets meet goal
    const allMet = ex.sets.slice(0, numSets).every(s => s && parseInt(s) >= goal);
    if (allMet) streak++;
    else break;
  }
  return streak;
}

/** Normalize numeric input: replace comma with dot, strip non-numeric chars, keep only one dot.
    Used for weight, waist, set values, mastery goal — anywhere numbers are entered. */
function normalizeNum(str) {
  var v = String(str).replace(/,/g, '.');
  v = v.replace(/[^0-9.]/g, '');
  var dot = v.indexOf('.');
  if (dot !== -1) v = v.slice(0, dot + 1) + v.slice(dot + 1).replace(/\./g, '');
  return v;
}

// ============================================================================
// RENDER — builds the entire week grid
// ============================================================================

var _rendering = false;
function render() {
  // Guard against reentrant calls (e.g. grid.innerHTML='' triggers onchange on
  // destroyed inputs, which calls onEdit → render() again inside this render)
  if (_rendering) return;
  _rendering = true;

  // Preserve focus across re-render: save which input was focused + cursor position
  var focused = document.activeElement;
  var focusId = focused && focused.dataset && focused.dataset.focusId || null;
  var selStart = focused && focused.selectionStart;
  var selEnd = focused && focused.selectionEnd;

  const grid = document.getElementById('planGrid');
  grid.innerHTML = '';

  // Update week label
  const eow = new Date(weekStart);
  eow.setDate(eow.getDate() + 6);
  document.getElementById('weekLabel').textContent = 'Week  ' + fmt(weekStart) + ' — ' + fmt(eow);

  // Render 7 day rows (Mon through Sun)
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    const dow = d.getDay();
    const isToday = same(d, today);

    // Day row container
    const row = document.createElement('div');
    row.className = 'day-row' + (isToday ? ' is-today' : '');

    // Day label (left column)
    const label = document.createElement('div');
    label.className = 'day-label';
    label.style.background = DAY_COLOR;
    label.innerHTML =
      '<div class="day-label-name">' + DAY_SHORT[dow] + '</div>' +
      '<div class="day-label-date">' + fmt(d) + '</div>' +
      (isToday ? '<div class="today-tag">TODAY</div>' : '');
    row.appendChild(label);

    // Day data setup — create empty record on first access
    const cardioKey = dk(d);
    if (!state.days[cardioKey]) state.days[cardioKey] = { exercises: [] };
    const dayData = state.days[cardioKey];

    // Tracking cell — holds weight + waist rows
    const trackCell = document.createElement('div');
    trackCell.className = 'tracking-cell';

    // Weight row
    const weightRow = document.createElement('div'); weightRow.className = 'cardio-row';
    const weightIcon = document.createElement('span'); weightIcon.className = 'cardio-icon'; weightIcon.textContent = '\u{2696}';
    const weightInp = document.createElement('input'); weightInp.type = 'text'; weightInp.inputMode = 'decimal';
    weightInp.dataset.focusId = 'weight-' + cardioKey;
    weightInp.placeholder = 'kg'; weightInp.value = dayData.weight || '';
    weightInp.oninput = () => { weightInp.value = normalizeNum(weightInp.value); state.days[cardioKey].weight = weightInp.value; save(); render(); };
    const weightUnit = document.createElement('span'); weightUnit.className = 'cardio-unit'; weightUnit.textContent = 'kg';
    const weightAvg = avg7('weight', cardioKey);
    const weightAvgSpan = document.createElement('span'); weightAvgSpan.className = 'cardio-avg';
    weightAvgSpan.textContent = weightAvg !== null ? 'ø' + weightAvg.toFixed(1) : '';
    // Week-over-week delta: shows "Δ+0.3" / "Δ−0.5" / "Δ-" (dash if either 7-day window is empty)
    const weightDelta = weekDelta('weight', cardioKey);
    const weightDeltaSpan = document.createElement('span'); weightDeltaSpan.className = 'cardio-delta';
    weightDeltaSpan.textContent = weightDelta === null ? 'Δ-' : 'Δ' + (weightDelta >= 0 ? '+' : '−') + Math.abs(weightDelta).toFixed(1);
    weightRow.appendChild(weightIcon); weightRow.appendChild(weightInp); weightRow.appendChild(weightUnit); weightRow.appendChild(weightAvgSpan); weightRow.appendChild(weightDeltaSpan);
    trackCell.appendChild(weightRow);

    // Waist row
    const waistRow = document.createElement('div'); waistRow.className = 'cardio-row';
    const waistIcon = document.createElement('span'); waistIcon.className = 'cardio-icon'; waistIcon.textContent = '\u{1F4CF}';
    const waistInp = document.createElement('input'); waistInp.type = 'text'; waistInp.inputMode = 'decimal';
    waistInp.dataset.focusId = 'waist-' + cardioKey;
    waistInp.placeholder = 'cm'; waistInp.value = dayData.waist || '';
    waistInp.oninput = () => { waistInp.value = normalizeNum(waistInp.value); state.days[cardioKey].waist = waistInp.value; save(); render(); };
    const waistUnit = document.createElement('span'); waistUnit.className = 'cardio-unit'; waistUnit.textContent = 'cm';
    const waistAvg = avg7('waist', cardioKey);
    const waistAvgSpan = document.createElement('span'); waistAvgSpan.className = 'cardio-avg';
    waistAvgSpan.textContent = waistAvg !== null ? 'ø' + waistAvg.toFixed(1) : '';
    // Week-over-week delta (same logic as weight row)
    const waistDelta = weekDelta('waist', cardioKey);
    const waistDeltaSpan = document.createElement('span'); waistDeltaSpan.className = 'cardio-delta';
    waistDeltaSpan.textContent = waistDelta === null ? 'Δ-' : 'Δ' + (waistDelta >= 0 ? '+' : '−') + Math.abs(waistDelta).toFixed(1);
    waistRow.appendChild(waistIcon); waistRow.appendChild(waistInp); waistRow.appendChild(waistUnit); waistRow.appendChild(waistAvgSpan); waistRow.appendChild(waistDeltaSpan);
    trackCell.appendChild(waistRow);

    row.appendChild(trackCell);

    // Exercise cells
    const exRow = document.createElement('div');
    exRow.className = 'exercises-row';

    const dd = ensureDay(d);
    for (let ei = 0; ei < dd.exercises.length; ei++) {
      exRow.appendChild(cell(d, dd, ei));
    }

    // +/− buttons for adding/removing exercises (max 8 per day).
    // capturedDate is needed because the loop variable `d` gets mutated on next iteration.
    // Only shown for today and future days (past days are locked).
    const btns = document.createElement('div');
    btns.className = 'add-ex-cell';
    const isPast = d < today;
    if (!isPast && dd.exercises.length < 8) {
      const ab = document.createElement('button');
      ab.className = 'add-ex-btn'; ab.textContent = '+';
      const capturedDate = new Date(d);
      ab.onclick = () => {
        const dayData = ensureDay(capturedDate);
        delete dayData.noExercises;
        dayData.exercises.push({ name: '', sets: ['','',''] });
        propagateDayPlan(capturedDate);
        save(); render();
      };
      btns.appendChild(ab);
    }
    // Show − button when there's at least 1 exercise (allows going to zero)
    if (!isPast && dd.exercises.length > 0) {
      const rb = document.createElement('button');
      rb.className = 'rm-ex-btn'; rb.textContent = '−';
      const capturedDate = new Date(d);
      rb.onclick = () => {
        const dayData = ensureDay(capturedDate);
        dayData.exercises.pop();
        if (dayData.exercises.length === 0) dayData.noExercises = true;
        propagateDayPlan(capturedDate);
        save(); render();
      };
      btns.appendChild(rb);
    }
    exRow.appendChild(btns);

    row.appendChild(exRow);
    grid.appendChild(row);
  }

  _rendering = false;

  // Restore focus to the same input after re-render
  if (focusId) {
    var el = document.querySelector('[data-focus-id="' + focusId + '"]');
    if (el) {
      el.focus();
      if (typeof selStart === 'number') {
        try { el.selectionStart = selStart; el.selectionEnd = selEnd; } catch(e) {}
      }
    }
  }
}

/**
 * Creates a single exercise cell for a given day and exercise index.
 * Contains: dropdown, history lines (-2, -1, now), and set input fields.
 */
function cell(d, dd, ei) {
  const ex = dd.exercises[ei];
  const key = dk(d);
  const isPast = d < today;
  const c = document.createElement('div');
  c.className = 'exercise-cell' + (ex.skipped ? ' skipped' : '');

  // === EXERCISE DROPDOWN ===
  const sel = document.createElement('select');
  if (isPast) sel.disabled = true;
  sel.innerHTML = '<option value="">— exercise —</option>';
  state.exercises.forEach(e => {
    // Hide archived exercises from dropdown (unless currently selected on this day)
    if (e.archived && e.name !== ex.name) return;
    const o = document.createElement('option');
    o.value = e.name;
    o.textContent = e.name + (e.rings ? ' ⊙' : '');
    if (e.name === ex.name) o.selected = true;
    sel.appendChild(o);
  });
  sel.onchange = () => {
    dd.exercises[ei].name = sel.value;
    dd.exercises[ei].sets = normalizeSets(dd.exercises[ei].sets, sel.value);
    delete dd.exercises[ei].skipped;
    propagateDayPlan(d);
    save(); render();
  };
  c.appendChild(sel);

  // === SKIP BUTTON (any day with an exercise selected) ===
  if (ex.name) {
    const skipBtn = document.createElement('button');
    skipBtn.className = 'skip-btn' + (ex.skipped ? ' active' : '');
    skipBtn.textContent = ex.skipped ? '↩ Undo skip' : 'Skip';
    skipBtn.onclick = () => {
      dd.exercises[ei].skipped = !dd.exercises[ei].skipped;
      if (!dd.exercises[ei].skipped) delete dd.exercises[ei].skipped;
      save(); render();
    };
    c.appendChild(skipBtn);
  }

  // === HISTORY LINES (-2, -1, now) ===
  // Shows the last 2 recorded sessions of this exercise (any day), plus current.
  if (ex.name) {
    const recent = getRecentSets(dk(d), ex.name, 2);
    const prev1 = recent[0] || null;  // most recent previous session
    const prev2 = recent[1] || null;  // second most recent

    const l2 = document.createElement('div'); l2.className = 'wk-line';
    l2.innerHTML = '<span class="wk-label">-2:</span>' +
      (prev2 && fmtSets(prev2) ? '<span class="wk-val">' + fmtSets(prev2) + '</span>' : '<span class="wk-none">–</span>');
    c.appendChild(l2);

    const l1 = document.createElement('div'); l1.className = 'wk-line';
    l1.innerHTML = '<span class="wk-label">-1:</span>' +
      (prev1 && fmtSets(prev1) ? '<span class="wk-val">' + fmtSets(prev1) + '</span>' : '<span class="wk-none">–</span>');
    c.appendChild(l1);

    const nowLine = document.createElement('div'); nowLine.className = 'wk-line';
    if (ex.skipped) {
      nowLine.innerHTML = '<span class="wk-label">now:</span><span class="wk-val" style="color:var(--text3);font-style:italic">skipped</span>';
    } else {
      const tw = ex.sets && ex.sets.some(s => s) ? ex.sets : null;
      if (tw && fmtSets(tw)) {
        nowLine.innerHTML = '<span class="wk-label">now:</span><span class="wk-val cur">' + fmtSets(tw) + '</span>';
      } else {
        nowLine.style.display = 'none';
        nowLine.innerHTML = '<span class="wk-label">now:</span><span class="wk-val cur"></span>';
      }
    }
    c.appendChild(nowLine);

    // Δ5: today's set-sum vs avg of last 5 scheduled sessions (skipped excluded, no backfill).
    // Hidden when the day has no sets filled yet (would otherwise always show -avg).
    if (!ex.skipped && ex.sets && ex.sets.some(s => s)) {
      const avg5 = getRecent5Avg(dk(d), ex.name);
      const diffLine = document.createElement('div'); diffLine.className = 'wk-line';
      if (avg5 === null) {
        diffLine.innerHTML = '<span class="wk-label">Δ5:</span><span class="wk-none">–</span>';
      } else {
        const todaySum = ex.sets.reduce((a, v) => a + (parseInt(v) || 0), 0);
        const diff = Math.round(todaySum - avg5);
        const sign = diff > 0 ? '+' : '';
        const cls = diff > 0 ? 'wk-diff-pos' : (diff < 0 ? 'wk-diff-neg' : 'wk-diff-zero');
        diffLine.innerHTML = '<span class="wk-label">Δ5:</span><span class="' + cls + '">' + sign + diff + '</span>';
      }
      c.appendChild(diffLine);
    }
  } else {
    // No exercise selected — show empty history placeholders
    ['-2:', '-1:'].forEach(lbl => {
      const l = document.createElement('div'); l.className = 'wk-line';
      l.innerHTML = '<span class="wk-label">' + lbl + '</span><span class="wk-none">–</span>';
      c.appendChild(l);
    });
  }

  // === SET INPUT FIELDS / SKIPPED STATE ===
  if (ex.skipped) {
    // Show SKIPPED label instead of set inputs when exercise is skipped
    const skippedLabel = document.createElement('div');
    skippedLabel.className = 'skipped-label';
    skippedLabel.textContent = 'SKIPPED';
    c.appendChild(skippedLabel);
  } else {
    // Number of inputs determined by exercise's 'sets' config (1-6)
    const numSets = ex.name ? getSetCount(ex.name) : 3;
    ex.sets = normalizeSets(ex.sets, ex.name);

    const sr = document.createElement('div'); sr.className = 'sets-row';
    for (let si = 0; si < numSets; si++) {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.dataset.focusId = 'set-' + key + '-' + ei + '-' + si;
      inp.placeholder = 'S' + (si + 1);
      inp.value = ex.sets[si] || '';
      if (isPast) { inp.readOnly = true; }
      // Save on every keystroke + full re-render (updates now line, mastery, etc.)
      const onEdit = () => {
        inp.value = normalizeNum(inp.value);
        state.days[key].exercises[ei].sets[si] = inp.value;
        save(); render();
      };
      inp.oninput = onEdit;
      inp.onchange = onEdit;
      sr.appendChild(inp);
    }
    c.appendChild(sr);

    // === MASTERY INDICATOR ===
    if (ex.name) {
      const exDef = state.exercises.find(e => e.name === ex.name);
      const goal = exDef && exDef.masteryReps;
      if (goal > 0) {
        const streak = Math.min(getMasteryStreak(ex.name, goal, numSets, d), 3);
        const badge = document.createElement('div');
        badge.className = 'mastery-badge mastery-' + streak;
        if (streak >= 3) {
          badge.textContent = '\u2605 MASTERED \u2605';
        } else if (streak === 2) {
          badge.textContent = '\u2191 ' + goal + ' reps — ' + streak + '/3';
        } else if (streak === 1) {
          badge.textContent = goal + ' reps — ' + streak + '/3';
        } else {
          badge.textContent = 'goal: ' + goal + ' reps';
        }
        c.appendChild(badge);
      }
    }
  }

  // === MOVE BUTTONS (left/right on desktop, up/down on mobile) ===
  if (!isPast && dd.exercises.length > 1) {
    const mr = document.createElement('div'); mr.className = 'move-row';
    if (ei > 0) {
      const lb = document.createElement('button'); lb.className = 'move-btn move-prev';
      lb.title = 'Move';
      ((idx, dayDate) => { lb.onclick = () => { moveExercise(dayDate, idx, -1); }; })(ei, new Date(d));
      mr.appendChild(lb);
    }
    if (ei < dd.exercises.length - 1) {
      const rb = document.createElement('button'); rb.className = 'move-btn move-next';
      rb.title = 'Move';
      ((idx, dayDate) => { rb.onclick = () => { moveExercise(dayDate, idx, 1); }; })(ei, new Date(d));
      mr.appendChild(rb);
    }
    c.appendChild(mr);
  }

  return c;
}

/** Swap exercise at index `ei` with its neighbor (dir: -1 = left, +1 = right) */
function moveExercise(d, ei, dir) {
  const key = dk(d);
  const dayData = state.days[key];
  const target = ei + dir;
  if (!dayData || target < 0 || target >= dayData.exercises.length) return;
  const tmp = dayData.exercises[ei];
  dayData.exercises[ei] = dayData.exercises[target];
  dayData.exercises[target] = tmp;
  propagateDayPlan(d);
  save(); render();
}

/** Navigate to previous/next week (delta = -1 or +1) */
function changeWeek(delta) {
  weekStart.setDate(weekStart.getDate() + delta * 7);
  render();
}

/** Jump back to the week containing today */
function goToday() {
  weekStart = getMonday(new Date(today));
  render();
}

/** Rename an exercise everywhere: master list, all days, and weekly plan template. */
function renameExercise(oldName, newName) {
  // Update master exercise list
  const ex = state.exercises.find(e => e.name === oldName);
  if (ex) ex.name = newName;

  // Update all days in the log
  for (const dd of Object.values(state.days)) {
    if (!dd.exercises) continue;
    for (const e of dd.exercises) {
      if (e.name === oldName) e.name = newName;
    }
  }

  // Update saved plan template
  if (state.plan) {
    for (const dow of Object.keys(state.plan)) {
      state.plan[dow] = state.plan[dow].map(n => n === oldName ? newName : n);
    }
  }

  save(); renderManage(); render();
}

/** Check if an exercise name appears in any logged day's exercise list */
function isExerciseUsedInDays(name) {
  return Object.values(state.days || {}).some(d =>
    d.exercises && d.exercises.some(e => e.name === name)
  );
}

/** Open the exercise management modal (add/remove exercises, configure sets/goals) */
function openManage() {
  document.getElementById('manageOverlay').classList.add('open');
  renderManage();
}

function closeManage() {
  document.getElementById('manageOverlay').classList.remove('open');
}

/** Renders the exercise list inside the manage modal (active + archived sections) */
function renderManage() {
  const list = document.getElementById('manageList');
  list.innerHTML = '';

  state.exercises.forEach((ex, i) => {
    if (ex.archived) return; // archived shown separately below
    const item = document.createElement('div'); item.className = 'manage-item';

    // Exercise name (click to rename inline)
    const name = document.createElement('span');
    name.className = 'ex-name'; name.textContent = ex.name;
    name.title = 'Click to rename';
    name.onclick = () => {
      const inp = document.createElement('input');
      inp.className = 'ex-name-edit'; inp.value = ex.name;
      const oldName = ex.name;
      const commit = () => {
        const newName = inp.value.trim();
        if (!newName || newName === oldName) { renderManage(); return; }
        if (state.exercises.some(e => e.name !== oldName && e.name.toLowerCase() === newName.toLowerCase())) {
          alert('Name already exists.'); inp.focus(); return;
        }
        renameExercise(oldName, newName);
      };
      inp.onblur = commit;
      inp.onkeydown = (e) => { if (e.key === 'Enter') inp.blur(); if (e.key === 'Escape') renderManage(); };
      name.replaceWith(inp);
      inp.focus(); inp.select();
    };
    item.appendChild(name);

    // Rings badge
    if (ex.rings) {
      const b = document.createElement('span');
      b.className = 'ring-badge'; b.textContent = '⊙';
      item.appendChild(b);
    }

    // Sets count config (−  N  + sets)
    const cfg = document.createElement('div'); cfg.className = 'sets-cfg';

    const minus = document.createElement('button'); minus.textContent = '−';
    minus.onclick = () => {
      if (ex.sets > 1) { ex.sets--; save(); renderManage(); render(); }
    };
    cfg.appendChild(minus);

    const num = document.createElement('span');
    num.className = 'sets-num'; num.textContent = ex.sets || 3;
    cfg.appendChild(num);

    const plus = document.createElement('button'); plus.textContent = '+';
    plus.onclick = () => {
      if (ex.sets < 6) { ex.sets++; save(); renderManage(); render(); }
    };
    cfg.appendChild(plus);

    const sLabel = document.createElement('span');
    sLabel.style.cssText = 'font-size:10px;color:var(--text3);margin-left:1px;';
    sLabel.textContent = 'sets';
    cfg.appendChild(sLabel);

    item.appendChild(cfg);

    // Mastery goal config
    const mcfg = document.createElement('div'); mcfg.className = 'mastery-cfg';
    const mLabel = document.createElement('span');
    mLabel.style.cssText = 'font-size:10px;color:var(--text3);';
    mLabel.textContent = 'goal';
    mcfg.appendChild(mLabel);
    const mInput = document.createElement('input');
    mInput.type = 'text'; mInput.inputMode = 'numeric';
    mInput.placeholder = '–';
    mInput.value = ex.masteryReps || '';
    mInput.oninput = () => { mInput.value = normalizeNum(mInput.value); };
    mInput.onchange = () => {
      ex.masteryReps = parseInt(mInput.value) || 0;
      save(); render();
    };
    mcfg.appendChild(mInput);
    item.appendChild(mcfg);

    // Archive button
    const arch = document.createElement('button'); arch.className = 'archive-btn'; arch.textContent = '\u{1F4E6}';
    arch.title = 'Archive';
    arch.onclick = () => {
      ex.archived = true; save(); renderManage(); render();
    };
    item.appendChild(arch);

    // Delete button
    const del = document.createElement('button'); del.className = 'del-btn'; del.textContent = '×';
    del.onclick = () => {
      if (isExerciseUsedInDays(ex.name)) {
        alert('Cannot delete "' + ex.name + '" — it has been used in logged days. Archive it instead.');
        return;
      }
      if (confirm('Remove "' + ex.name + '"?')) {
        state.exercises.splice(i, 1); save(); renderManage(); render();
      }
    };
    item.appendChild(del);

    list.appendChild(item);
  });

  // Archived exercises section
  renderArchivedList();
}

/** Render the archived exercises toggle and list */
function renderArchivedList() {
  const archived = state.exercises.filter(e => e.archived);
  const toggle = document.getElementById('archivedToggle');
  const container = document.getElementById('archivedList');

  if (archived.length === 0) {
    toggle.style.display = 'none';
    container.style.display = 'none';
    return;
  }

  toggle.style.display = '';
  toggle.textContent = (container.style.display === 'none' ? '\u25B6' : '\u25BC') + ' Archived exercises (' + archived.length + ')';

  container.innerHTML = '';
  if (container.style.display === 'none') return;

  archived.forEach(ex => {
    const item = document.createElement('div'); item.className = 'manage-item';

    const name = document.createElement('span');
    name.className = 'ex-name'; name.textContent = ex.name;
    name.style.cursor = 'default';
    item.appendChild(name);

    if (ex.rings) {
      const b = document.createElement('span');
      b.className = 'ring-badge'; b.textContent = '\u2299';
      item.appendChild(b);
    }

    const info = document.createElement('span');
    info.style.cssText = 'font-size:10px;color:var(--text3);margin-left:auto';
    info.textContent = (ex.sets || 3) + ' sets' + (ex.masteryReps ? ' · goal ' + ex.masteryReps : '');
    item.appendChild(info);

    // Restore button
    const restore = document.createElement('button'); restore.className = 'restore-btn'; restore.textContent = 'Restore';
    restore.onclick = () => {
      delete ex.archived; save(); renderManage(); render();
    };
    item.appendChild(restore);

    // Delete button
    const del = document.createElement('button'); del.className = 'del-btn'; del.textContent = '\u00D7';
    del.onclick = () => {
      if (isExerciseUsedInDays(ex.name)) {
        alert('Cannot delete "' + ex.name + '" — it has been used in logged days.');
        return;
      }
      if (confirm('Permanently remove "' + ex.name + '"?')) {
        const idx = state.exercises.indexOf(ex);
        if (idx !== -1) state.exercises.splice(idx, 1);
        save(); renderManage();
      }
    };
    item.appendChild(del);

    container.appendChild(item);
  });
}

/** Toggle visibility of the archived exercises list */
function toggleArchivedList() {
  const container = document.getElementById('archivedList');
  container.style.display = container.style.display === 'none' ? '' : 'none';
  renderArchivedList();
}

/** Add a new exercise from the input fields in the manage modal */
function addExercise() {
  const ni = document.getElementById('newExName');
  const ri = document.getElementById('newExRings');
  const mi = document.getElementById('newExMastery');
  const name = ni.value.trim();
  if (!name) return;
  if (state.exercises.some(e => e.name.toLowerCase() === name.toLowerCase())) {
    alert('Already exists.'); return;
  }
  state.exercises.push({ name, rings: ri.checked, sets: 3, masteryReps: parseInt(mi.value) || 0 });
  save(); ni.value = ''; ri.checked = false; mi.value = '';
  renderManage(); render();
}

/** Download complete state as JSON file (full backup of ALL data) */
function exportJSON() {
  dl(new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' }),
    'workout_log_' + dk(today) + '.json');
}

/** Download training log as CSV (semicolon-separated, UTF-8 with BOM).
    Columns: Date, Day, Exercise, Set1..SetN (per-exercise rows) + Weight/Waist rows. */
function exportCSV() {
  // Dynamic column count based on max sets across all exercises
  let maxS = 3;
  state.exercises.forEach(e => { if (e.sets > maxS) maxS = e.sets; });

  let csv = 'Date;Day;Exercise;';
  for (let i = 1; i <= maxS; i++) csv += 'Set' + i + ';';
  csv = csv.slice(0, -1) + '\n';

  Object.keys(state.days).sort().forEach(k => {
    const day = state.days[k];
    const p = k.split('-');
    const d = new Date(+p[0], +p[1]-1, +p[2]);
    (day.exercises || []).forEach(ex => {
      if (!ex.name || ex.skipped || !ex.sets || !ex.sets.some(s => s)) return;
      let line = [k, DAY_NAMES[d.getDay()], ex.name];
      for (let i = 0; i < maxS; i++) line.push(ex.sets[i] || '');
      csv += line.join(';') + '\n';
    });
    if (day.weight) {
      csv += [k, DAY_NAMES[d.getDay()], 'Weight', day.weight + ' kg'].join(';') + '\n';
    }
    if (day.waist) {
      csv += [k, DAY_NAMES[d.getDay()], 'Waist', day.waist + ' cm'].join(';') + '\n';
    }
  });
  dl(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }),
    'workout_log_' + dk(today) + '.csv');
}

/** Helper: trigger file download */
function dl(b, f) {
  const u = URL.createObjectURL(b);
  const a = document.createElement('a');
  a.href = u; a.download = f; a.click();
  URL.revokeObjectURL(u);
}

/** Import JSON backup — replaces ALL data */
function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      state = JSON.parse(ev.target.result);
      migrate(); save(); render();
      alert('Data imported successfully.');
    } catch(err) { alert('Error: ' + err.message); }
  };
  r.readAsText(file);
  e.target.value = '';  // Reset so same file can be re-imported
}

// ============================================================================
// SEED TODAY — pre-fills today with sample data (only runs once, on first use)
// ============================================================================

(function seedToday() {
  // Only seed on very first use — skip if any day data already exists
  if (Object.keys(state.days).length > 0) return;
  // Sample data from first workout session
  const k = dk(today);
  state.days[k] = { exercises: [
    { name: 'Horiz. Pullups',  sets: ['26', '23', '20'] },
    { name: 'Dips / Hold',     sets: ['24', '16', '10'] },
    { name: 'Straight Bridges', sets: ['30', '26', '23'] },
  ]};
  save();
})();

// ============================================================================
// INITIAL RENDER
// ============================================================================

// Initial render (from localStorage), then pull latest from cloud.
// cloudLoad() may re-render if cloud data is newer.
render();
cloudLoad();
</script>
